<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaft Proxy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/random-coder2/swaft-proxy@main/public/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">⚡</span>
                <span class="brand-text">Swaft Proxy</span>
            </div>
            <div class="nav-links">
                <button class="nav-btn active" data-page="home">Home</button>
                <button class="nav-btn" data-page="search">Search</button>
                <button class="nav-btn" data-page="apps">Apps</button>
                <button class="nav-btn" data-page="settings">Settings</button>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" id="theme-toggle" title="Toggle Theme">🌙</button>
                <button class="icon-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Home / Proxy Page -->
            <section id="home-page" class="page active">
                <div class="proxy-container">
                    <div class="search-box">
                        <div class="input-wrapper">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="proxy-url" placeholder="Enter URL or search query..." autocomplete="off">
                            <button class="clear-btn hidden" id="clear-url">✕</button>
                        </div>
                        <button class="go-btn" id="go-btn">Go</button>
                    </div>
                    
                    <div class="quick-links">
                        <button class="quick-btn" data-url="https://google.com">
                            <img src="https://www.google.com/favicon.ico" alt="Google">
                            <span>Google</span>
                        </button>
                        <button class="quick-btn" data-url="https://youtube.com">
                            <img src="https://www.youtube.com/favicon.ico" alt="YouTube">
                            <span>YouTube</span>
                        </button>
                        <button class="quick-btn" data-url="https://reddit.com">
                            <img src="https://www.reddit.com/favicon.ico" alt="Reddit">
                            <span>Reddit</span>
                        </button>
                        <button class="quick-btn" data-url="https://github.com">
                            <img src="https://github.com/favicon.ico" alt="GitHub">
                            <span>GitHub</span>
                        </button>
                        <button class="quick-btn" data-url="https://discord.com">
                            <img src="https://discord.com/favicon.ico" alt="Discord">
                            <span>Discord</span>
                        </button>
                        <button class="quick-btn" data-url="https://wikipedia.org">
                            <img src="https://wikipedia.org/favicon.ico" alt="Wiki">
                            <span>Wiki</span>
                        </button>
                    </div>

                    <div class="status-bar hidden" id="status-bar">
                        <div class="status-spinner"></div>
                        <span id="status-text">Loading...</span>
                    </div>

                    <div class="proxy-frame-container">
                        <iframe id="proxy-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-downloads"></iframe>
                        <div class="frame-overlay hidden" id="frame-overlay">
                            <div class="loading-spinner"></div>
                            <p>Loading content...</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Search Page -->
            <section id="search-page" class="page">
                <div class="search-container">
                    <div class="search-header">
                        <h2>Web Search</h2>
                        <div class="engine-selector">
                            <select id="search-engine">
                                <option value="https://www.google.com/search?q=">Google</option>
                                <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
                                <option value="https://www.bing.com/search?q=">Bing</option>
                                <option value="https://search.brave.com/search?q=">Brave</option>
                            </select>
                        </div>
                    </div>
                    <div class="search-box large">
                        <div class="input-wrapper">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="search-query" placeholder="Search the web...">
                        </div>
                        <button class="go-btn" id="search-btn">Search</button>
                    </div>
                </div>
            </section>

            <!-- Apps/Games Page -->
            <section id="apps-page" class="page">
                <div class="apps-container">
                    <h2>Apps & Games</h2>
                    <div class="category-filter">
                        <button class="filter-btn active" data-category="all">All</button>
                        <button class="filter-btn" data-category="popular">Popular</button>
                        <button class="filter-btn" data-category="games">Games</button>
                        <button class="filter-btn" data-category="tools">Tools</button>
                    </div>
                    <div class="apps-grid" id="apps-grid">
                        <!-- Apps will be populated by JavaScript -->
                    </div>
                </div>
            </section>

            <!-- Settings Page -->
            <section id="settings-page" class="page">
                <div class="settings-container">
                    <h2>Settings</h2>
                    
                    <div class="setting-group">
                        <h3>Appearance</h3>
                        <div class="setting-item">
                            <label>Theme</label>
                            <select id="theme-select">
                                <option value="dark">Dark</option>
                                <option value="light">Light</option>
                                <option value="midnight">Midnight</option>
                                <option value="forest">Forest</option>
                                <option value="ocean">Ocean</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Background Effect</label>
                            <select id="bg-effect">
                                <option value="none">None</option>
                                <option value="dots">Dots</option>
                                <option value="grid">Grid</option>
                                <option value="gradient">Gradient</option>
                            </select>
                        </div>
                    </div>

                    <div class="setting-group">
                        <h3>Proxy Settings</h3>
                        <div class="setting-item">
                            <label>Proxy Engine</label>
                            <select id="proxy-engine">
                                <option value="auto">Automatic</option>
                                <option value="scramjet">Scramjet</option>
                                <option value="ultraviolet">Ultraviolet</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Backend Server</label>
                            <input type="text" id="backend-server" placeholder="https://your-server.com">
                        </div>
                    </div>

                    <div class="setting-group">
                        <h3>Tab Cloak</h3>
                        <div class="setting-item">
                            <label>Cloak Tab</label>
                            <input type="checkbox" id="cloak-enabled">
                        </div>
                        <div class="setting-item" id="cloak-options" style="display: none;">
                            <label>Cloak Title</label>
                            <input type="text" id="cloak-title" placeholder="Google Classroom">
                            <label style="margin-top: 10px;">Cloak Icon URL</label>
                            <input type="text" id="cloak-icon" placeholder="https://...">
                        </div>
                    </div>

                    <div class="setting-group">
                        <h3>About</h3>
                        <p class="about-text">
                            <strong>Swaft Proxy v1.0</strong><br>
                            A web proxy solution for secure browsing.<br>
                            Forked from DogeUB.
                        </p>
                        <button class="btn-secondary" id="reset-settings">Reset to Defaults</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/random-coder2/swaft-proxy@main/public/app.js"></script>
</body>
</html>
